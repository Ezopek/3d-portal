server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }

  # Long cache for hashed assets
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Pass-through; the actual /api/* routing happens at edge nginx-180.
  # When the web image is reverse-proxied, this block is unused — but
  # provides a working same-origin setup for local `docker compose up`.
  location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
  }
}
