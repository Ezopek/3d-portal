server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Multipart admin uploads can carry print photos (~5 MB) and source
  # archives. Match the .180 edge proxy's 100 MB ceiling so the inner
  # nginx isn't the bottleneck.
  client_max_body_size 100m;

  # Real-IP trust boundary (Story 6.6 codex fix-up #3).
  #
  # Topology:
  #   - HTTPS browser → edge nginx 192.168.2.180 → web :8090 → api
  #   - direct LAN / VPN curl       →               web :8090 → api
  #
  # Host port 8090 is bound 0.0.0.0 (see infra/docker-compose.yml `web:`
  # ports comment) so any caller on 192.168.2.0/24 — or anyone with route
  # to .190 — can reach it without traversing the edge. Without a trust
  # rule, a direct caller could vary `X-Real-IP` per request and pick a
  # fresh rate-limit bucket every time, bypassing the per-IP limiter.
  #
  # Fix: trust `X-Real-IP` ONLY when it comes from the edge nginx server
  # itself. `set_real_ip_from 192.168.2.180/32` makes nginx rewrite
  # `$remote_addr` from the trusted forwarder's X-Real-IP. For every
  # other peer (direct curl, dev test), `$remote_addr` stays as the real
  # TCP peer IP and `X-Real-IP` from the caller is ignored. The /api/
  # block below then propagates `$remote_addr` to the API, which is now
  # always the right identity — either the real browser IP (edge case)
  # or the real direct caller IP (operator case).
  set_real_ip_from 192.168.2.180;
  real_ip_header X-Real-IP;
  real_ip_recursive on;

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }

  # Long cache for hashed assets
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # The edge nginx on .180 proxies the whole site (including /api/*)
  # here, so this block is on the hot path in production. Use Docker's
  # embedded DNS via a variable in proxy_pass — without that, nginx
  # resolves `api` once at startup and keeps the IP forever, breaking
  # whenever the api container is recreated and gets a new IP.
  #
  # X-Real-IP forwards $remote_addr, which is the real client identity:
  # the `set_real_ip_from 192.168.2.180` directive above rewrites
  # $remote_addr from the edge-set X-Real-IP when the request actually
  # came from the edge, and leaves it as the direct caller's TCP peer
  # IP otherwise. So this single source — $remote_addr — is correct
  # both for HTTPS browsers (real client IP) and for direct :8090 curls
  # (real caller IP, header-spoofing ignored).
  location /api/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:8000;
    proxy_pass $api_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
  }

  # Story 4.2 — self-serving agent runbook served by the API container
  # at /agent-runbook (root-level, NOT under /api/). Same Docker-DNS-via-
  # variable pattern as /api/ above. Must precede the SPA fallback
  # `location /` so the longer-prefix match wins.
  location /agent-runbook {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:8000;
    proxy_pass $api_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
  }
}
