document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

radius-lg);padding:18px 20px;max-width:560px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-muted-foreground);margin-bottom:10px;\" data-en=\"Open questions for you\">Otwarte pytania do Ciebie<\u002Fdiv>\n          <ul style=\"margin:0;padding-left:18px;font-size:13px;line-height:1.7;color:var(--color-muted-foreground);\">\n            <li data-en=\"Should a tag search exist globally (not just per-group)?\">Czy potrzebne globalne wyszukiwanie tagu (nie tylko per grupa)?<\u002Fli>\n            <li data-en=\"Do creators get their own facet group, or a 'Creator' tag prefix?\">Twórcy jako osobna faseta, czy prefiks tagu „Creator\"?<\u002Fli>\n            <li data-en=\"Cap how many groups show expanded by default?\">Ile grup rozwiniętych domyślnie?<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 08 · UNTAGGED / EDGE STATES ===== -->\n  <section data-screen-label=\"Stany bez tagów\" id=\"s8\" style=\"width:1360px;\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:16px;\">\n      <span style=\"display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9999px;background:var(--color-foreground);color:var(--color-background);font-size:14px;font-weight:700;\">08<\u002Fspan>\n      <h2 style=\"margin:0;font-size:20px;font-weight:700;\" data-en=\"Edge states — no tags / partial tags / empty result\">Stany brzegowe — brak tagów / częściowe / pusty wynik<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 18px;font-size:13.5px;line-height:1.55;color:var(--color-muted-foreground);max-width:920px;\" data-en=\"Tags are optional — nothing forces a model into a group. An untagged model is a normal, valid state: it still lives in the catalog, just matches no facet filter. These four states keep untagged content findable and fixable.\">Tagi są opcjonalne — nic nie zmusza modelu do przynależności. Model bez tagów to poprawny stan: nadal jest w katalogu, po prostu nie pasuje do żadnego filtra fasety. Te cztery stany pilnują, by nieotagowane modele dało się znaleźć i uzupełnić.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;\">\n\n      <!-- A: card with no tags -->\n      <div style=\"background:var(--color-card);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:22px;box-shadow:0 1px 3px rgba(15,23,42,.06);\">\n        <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-muted-foreground);margin-bottom:14px;\">A · <span data-en=\"Card with no tags\">Karta bez tagów<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:16px;align-items:flex-start;\">\n          <div style=\"width:150px;flex-shrink:0;border:1px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;background:var(--color-card);\"><div style=\"aspect-ratio:1;background:var(--color-muted);display:flex;align-items:center;justify-content:center;color:var(--color-muted-foreground);opacity:.5;\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z\"><\u002Fpath><path d=\"m3.3 7 8.7 5 8.7-5M12 22V12\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"padding:10px;\"><p style=\"margin:0 0 7px;font-size:12.5px;font-weight:500;\">Nowy import STL<\u002Fp><div style=\"display:flex;flex-wrap:wrap;gap:4px;\"><span style=\"font-size:11px;background:transparent;color:var(--color-muted-foreground);border:1px dashed var(--color-border);border-radius:var(--radius-sm);padding:1px 7px;\" data-en=\"No tags\">Bez tagów<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"font-size:12.5px;line-height:1.55;color:var(--color-muted-foreground);\">\n            <p style=\"margin:0 0 8px;\" data-en=\"Instead of an empty chip row, show one dashed ghost chip 'No tags'. It reads as intentional, not broken.\">Zamiast pustego rzędu — jeden przerywany chip „Bez tagów\". Czyta się jako celowe, nie zepsute.<\u002Fp>\n            <p style=\"margin:0;color:var(--color-foreground);\" data-en=\"Admins additionally see a subtle 'Add tags' action on hover.\">Admin dodatkowo widzi na hover subtelne „Dodaj tagi\".<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- B: untagged facet filter -->\n      <div style=\"background:var(--color-card);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:22px;box-shadow:0 1px 3px rgba(15,23,42,.06);\">\n        <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-muted-foreground);margin-bottom:14px;\">B · <span data-en=\"'Untagged' filter to find &amp; fix\">Filtr „Bez tagów\" do znalezienia<\u002Fspan><\u002Fdiv>\n        <div style=\"border:1px solid var(--color-border);border-radius:var(--radius-md);overflow:hidden;margin-bottom:12px;\">\n          <div style=\"padding:8px 10px;background:var(--color-muted);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-muted-foreground);\" data-en=\"Sidebar footer\">Stopka sidebaru<\u002Fdiv>\n          <label style=\"display:flex;align-items:center;gap:9px;padding:9px 10px;cursor:pointer;font-size:13.5px;background:hsl(38 92% 50% / .08);\"><span style=\"width:16px;height:16px;border:1.5px solid var(--color-border);border-radius:4px;flex-shrink:0;\"><\u002Fspan><span style=\"flex:1;color:var(--color-foreground);\" data-en=\"Untagged models\">Modele bez tagów<\u002Fspan><span style=\"font-size:11px;font-weight:600;color:var(--warn-fg);background:var(--warn-bg);border-radius:9999px;padding:1px 8px;\">12<\u002Fspan><\u002Flabel>\n        <\u002Fdiv>\n        <p style=\"margin:0;font-size:12.5px;line-height:1.55;color:var(--color-muted-foreground);\" data-en=\"A pinned 'Untagged' pseudo-facet at the bottom of the sidebar surfaces the backlog so it can be triaged — critical right after the migration when everything starts untagged.\">Przypięta pseudo-faseta „Bez tagów\" na dole sidebaru pokazuje zaległości do uzupełnienia — kluczowe tuż po migracji, gdy wszystko startuje bez tagów.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- C: detail with missing group -->\n      <div style=\"background:var(--color-card);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:22px;box-shadow:0 1px 3px rgba(15,23,42,.06);\">\n        <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-muted-foreground);margin-bottom:14px;\">C · <span data-en=\"Detail — a group has no tag\">Szczegóły — grupa bez tagu<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;margin-bottom:12px;\">\n          <div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"width:104px;flex-shrink:0;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--color-primary);\" data-en=\"Type\">Typ<\u002Fspan><div style=\"display:flex;flex-wrap:wrap;gap:6px;\"><span style=\"font-size:12.5px;background:var(--color-muted);color:var(--color-chip-foreground);border-radius:9999px;padding:3px 11px;\" data-en=\"Gadgets\">Gadżety<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"width:104px;flex-shrink:0;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--color-muted-foreground);\" data-en=\"Material\">Materiał<\u002Fspan><div style=\"display:flex;flex-wrap:wrap;gap:6px;align-items:center;\"><span style=\"font-size:12.5px;color:var(--color-muted-foreground);\">—<\u002Fspan><span style=\"font-size:12px;color:var(--color-primary);border:1px dashed hsl(221 83% 53% / .4);border-radius:9999px;padding:2px 10px;cursor:pointer;\" data-en=\"+ Add material\">+ Dodaj materiał<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:0;font-size:12.5px;line-height:1.55;color:var(--color-muted-foreground);\" data-en=\"Groups with no tag simply don't render for regular users (no empty rows). For admins the group shows an em-dash + inline 'Add' affordance, so gaps are one click to fill.\">Grupy bez tagu po prostu się nie renderują dla zwykłych userów (brak pustych rzędów). Adminowi grupa pokazuje myślnik + inline „Dodaj\", więc luki uzupełnia się jednym kliknięciem.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- D: empty result -->\n      <div style=\"background:var(--color-card);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:22px;box-shadow:0 1px 3px rgba(15,23,42,.06);\">\n        <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-muted-foreground);margin-bottom:14px;\">D · <span data-en=\"Filter yields zero (AND too tight)\">Filtr daje zero (AND za wąski)<\u002Fspan><\u002Fdiv>\n        <div style=\"border:1px dashed var(--color-border);border-radius:var(--radius-md);padding:28px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;\">\n          <span style=\"color:var(--color-muted-foreground);opacity:.6;\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"32\" height=\"32\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4.3-4.3M8 11h6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <p style=\"margin:0;font-size:13.5px;font-weight:500;color:var(--color-foreground);\" data-en=\"No models match all 4 tags\">Żaden model nie ma wszystkich 4 tagów<\u002Fp>\n          <p style=\"margin:0;font-size:12.5px;color:var(--color-muted-foreground);max-width:260px;\" data-en=\"Try switching to Any (OR), or remove a tag.\">Spróbuj przełączyć na Dowolny (OR) albo usuń tag.<\u002Fp>\n          <div style=\"display:flex;gap:8px;margin-top:2px;\">\n            <button type=\"button\" style=\"height:32px;padding:0 13px;border:1px solid var(--color-border);background:var(--color-background);border-radius:var(--radius-lg);font-family:inherit;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--color-foreground);\" data-en=\"Switch to OR\">Przełącz na OR<\u002Fbutton>\n            <button type=\"button\" style=\"height:32px;padding:0 13px;border:0;background:var(--color-primary);color:var(--color-primary-foreground);border-radius:var(--radius-lg);font-family:inherit;font-size:12.5px;font-weight:500;cursor:pointer;\" data-en=\"Clear filters\">Wyczyść filtry<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    // --- PL/EN language toggle (generic textContent swap over [data-en]) ---\n    const setLang = (lang) => {\n      document.querySelectorAll(\"[data-en]\").forEach((node) => {\n        if (!node.hasAttribute(\"data-pl\")) node.setAttribute(\"data-pl\", node.textContent);\n        node.textContent = lang === \"en\" ? node.getAttribute(\"data-en\") : node.getAttribute(\"data-pl\");\n      });\n      document.querySelectorAll(\"[data-en-ph]\").forEach((node) => {\n        if (!node.hasAttribute(\"data-pl-ph\")) node.setAttribute(\"data-pl-ph\", node.getAttribute(\"placeholder\") || \"\");\n        node.setAttribute(\"placeholder\", lang === \"en\" ? node.getAttribute(\"data-en-ph\") : node.getAttribute(\"data-pl-ph\"));\n      });\n      document.querySelectorAll(\"[data-lang-btn]\").forEach((b) => {\n        const on = b.getAttribute(\"data-lang-btn\") === lang;\n        b.style.background = on ? \"var(--color-primary)\" : \"transparent\";\n        b.style.color = on ? \"var(--color-primary-foreground)\" : \"var(--color-muted-foreground)\";\n      });\n    };\n    document.querySelectorAll(\"[data-lang-btn]\").forEach((b) => {\n      b.addEventListener(\"click\", () => setLang(b.getAttribute(\"data-lang-btn\")));\n    });\n\n    // --- collapsible facet groups ---\n    document.querySelectorAll(\"[data-collapse]\").forEach((h) => {\n      h.addEventListener(\"click\", () => {\n        const body = h.nextElementSibling;\n        if (!body) return;\n        const hidden = body.style.display === \"none\";\n        body.style.display = hidden ? \"\" : \"none\";\n        const chev = h.querySelector(\"[data-chevron]\");\n        if (chev) chev.style.transform = hidden ? \"\" : \"rotate(-90deg)\";\n      });\n    });\n\n    // --- light/dark theme toggle (flips DS color tokens on <body>) ---\n    const setTheme = (theme) => {\n      document.body.classList.toggle(\"dark\", theme === \"dark\");\n      document.querySelectorAll(\"[data-theme-btn]\").forEach((b) => {\n        const on = b.getAttribute(\"data-theme-btn\") === theme;\n        b.style.background = on ? \"var(--color-background)\" : \"transparent\";\n        b.style.color = on ? \"var(--color-foreground)\" : \"var(--color-muted-foreground)\";\n        b.style.boxShadow = on ? \"0 1px 2px rgba(15,23,42,.12)\" : \"none\";\n      });\n    };\n    document.querySelectorAll(\"[data-theme-btn]\").forEach((b) => {\n      b.addEventListener(\"click\", () => setTheme(b.getAttribute(\"data-theme-btn\")));\n    });\n  }\n  renderVals() {\n    return {};\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
