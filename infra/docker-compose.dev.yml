name: 3d-portal-dev

services:
  redis:
    image: redis:7-alpine
    networks: [portal-dev]

  api:
    image: python:3.12-slim
    working_dir: /app
    command: ["sh", "-c", "pip install -e .[dev] && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"]
    environment:
      ENVIRONMENT: dev
      ADMIN_EMAIL: admin@local
      ADMIN_PASSWORD: dev
      JWT_SECRET: dev-secret-32
      DATABASE_URL: sqlite:////data/state/portal.db
      REDIS_URL: redis://redis:6379/0
      CATALOG_DATA_DIR: /data/catalog
      RENDERS_DIR: /data/renders
      CATALOG_CACHE_DIR: /data/cache
    volumes:
      - ../apps/api:/app
      - /mnt/c/Users/ezope/Nextcloud/3d_modelowanie:/data/catalog:ro
      - dev-renders:/data/renders
      - dev-state:/data/state
      - dev-cache:/data/cache
    ports: ["8000:8000"]
    depends_on: [redis]
    networks: [portal-dev]

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: ["sh", "-c", "apt-get update && apt-get install -y libgl1 libglib2.0-0 && pip install -e .[dev] && arq render.worker.WorkerSettings --watch render"]
    environment:
      REDIS_URL: redis://redis:6379/0
      CATALOG_DATA_DIR: /data/catalog
      RENDERS_DIR: /data/renders
    volumes:
      - ../workers/render:/app
      - /mnt/c/Users/ezope/Nextcloud/3d_modelowanie:/data/catalog:ro
      - dev-renders:/data/renders
    depends_on: [redis]
    networks: [portal-dev]

  web:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "corepack enable && pnpm install && pnpm dev --host 0.0.0.0"]
    volumes:
      - ../apps/web:/app
      - dev-web-node-modules:/app/node_modules
    ports: ["5173:5173"]
    networks: [portal-dev]

networks:
  portal-dev:
    driver: bridge

volumes:
  dev-renders:
  dev-state:
  dev-cache:
  dev-web-node-modules:
