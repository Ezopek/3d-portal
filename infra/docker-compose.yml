name: 3d-portal

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks: [portal]

  api:
    image: portal-api:${PORTAL_VERSION}
    build:
      # Repo root context so the Dockerfile can COPY both apps/api/* and
      # docs/agents-add-model-runbook.md (Story 4.2 — self-serving runbook).
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: sqlite:////data/state/portal.db
      REDIS_URL: redis://redis:6379/0
      CATALOG_DATA_DIR: /data/catalog
      RENDERS_DIR: /data/renders
      STATE_DIR: /data/state
      CATALOG_CACHE_DIR: /data/cache
      PORTAL_CONTENT_DIR: /data/content
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS}
      SENTRY_DSN: ${SENTRY_DSN}
      PORTAL_VERSION: ${PORTAL_VERSION}
    volumes:
      - ${CATALOG_HOST_DIR}:/data/catalog:ro
      - ${RENDERS_HOST_DIR}:/data/renders:ro
      - ${STATE_HOST_DIR}:/data/state
      - ${CACHE_HOST_DIR}:/data/cache
      - ${CONTENT_HOST_DIR}:/data/content
    depends_on: [redis]
    restart: unless-stopped
    networks: [portal]

  worker:
    image: portal-render:${PORTAL_VERSION}
    build:
      context: ..
      dockerfile: workers/render/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////data/state/portal.db
      CONTENT_DIR: /data/content
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS}
      SENTRY_DSN: ${SENTRY_DSN}
      PORTAL_VERSION: ${PORTAL_VERSION}
      ENVIRONMENT: ${ENVIRONMENT}
    volumes:
      - ${STATE_HOST_DIR}:/data/state
      - ${CONTENT_HOST_DIR}:/data/content
    depends_on: [redis]
    restart: unless-stopped
    networks: [portal]

  arq-worker:
    image: portal-api:${PORTAL_VERSION}
    build:
      # Same context as `api` (shared image). See `api` service comment.
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ["arq", "app.workers.WorkerSettings"]
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: sqlite:////data/state/portal.db
      REDIS_URL: redis://redis:6379/0
      CATALOG_DATA_DIR: /data/catalog
      RENDERS_DIR: /data/renders
      STATE_DIR: /data/state
      CATALOG_CACHE_DIR: /data/cache
      PORTAL_CONTENT_DIR: /data/content
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS}
      SENTRY_DSN: ${SENTRY_DSN}
      PORTAL_VERSION: ${PORTAL_VERSION}
    volumes:
      - ${CATALOG_HOST_DIR}:/data/catalog:ro
      - ${RENDERS_HOST_DIR}:/data/renders:ro
      - ${STATE_HOST_DIR}:/data/state
      - ${CACHE_HOST_DIR}:/data/cache
      - ${CONTENT_HOST_DIR}:/data/content
    depends_on: [redis]
    restart: unless-stopped
    networks: [portal]

  web:
    image: portal-web:${PORTAL_VERSION}
    build:
      context: ../apps/web
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
        VITE_PORTAL_VERSION: ${PORTAL_VERSION}
        VITE_ENVIRONMENT: ${ENVIRONMENT}
        VITE_GIT_COMMIT: ${VITE_GIT_COMMIT:-}
        VITE_BUILD_TIME: ${VITE_BUILD_TIME:-}
        VITE_BUILD_HOST: ${VITE_BUILD_HOST:-}
        SENTRY_ORG: ${GLITCHTIP_ORG_SLUG:-}
        SENTRY_PROJECT: ${GLITCHTIP_PROJECT_SLUG:-}
        SENTRY_URL: http://192.168.2.190:8800
      secrets:
        - sentry_token
    ports:
      # Host port 8090 because 8080 is occupied by another service on .190.
      # Bound on 0.0.0.0 so the dev/working LAN can reach it directly while
      # nginx-180 is not yet wired up. Tighten to 127.0.0.1 once nginx-180
      # fronts the stack on `https://3d.ezop.ddns.net`.
      - "8090:8080"
    depends_on: [api]
    restart: unless-stopped
    networks: [portal]

networks:
  portal:
    driver: bridge

volumes:
  redis-data:

secrets:
  sentry_token:
    environment: GLITCHTIP_AUTH_TOKEN
